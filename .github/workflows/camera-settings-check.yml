name: Daily Camera Settings Check

on:
  schedule:
    # 8:17am UTC daily — checks Apple + Android support pages for drift
    - cron: '17 8 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Anthropic SDK
        run: npm install @anthropic-ai/sdk

      - name: Check camera settings instructions
        id: check
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/check-camera-settings.mjs

      - name: Open PR if instructions have drifted
        if: steps.check.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: update/camera-settings-instructions
          base: main
          commit-message: 'Update iPhone/Android camera settings instructions'
          title: 'Camera settings instructions may need updating'
          body: |
            The daily camera settings check found a potential drift between the style guide and Apple/Android support documentation.

            **What changed:** ${{ steps.check.outputs.diff_summary }}

            Please review the diff and merge if the update looks correct.

            ---
            *Generated by the daily camera settings check workflow.*
          delete-branch: true
